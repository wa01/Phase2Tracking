     baseCuts: 'tof<12.5&&hasRecHit>0'
     xTitle: 'residual x [cm]'
     xNbins: 200
     xMin: -0.1
     xMax: 0.1
     yTitle: 'dx [cm]'
     yNbins: 20
     yMin: 0.0
     yMax: 0.1
#
